[manifest]
schema_version = 1

[[engines]]
id = "pytest"
type = "pytest"
name = "pytest"
path = "packages"

[[engines]]
id = "pytest-internal"
type = "pytest"
name = "pytest-internal"
path = "internal"

[[resources]]
