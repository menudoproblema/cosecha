[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cosecha-workspace-python"
dynamic = ["version"]
description = "Default Python workspace layout adapters for Cosecha"
requires-python = ">=3.13"
dependencies = [
    "cosecha-workspace",
]

[dependency-groups]
dev = [
    "pre-commit",
    "ruff",
]

[project.entry-points."cosecha.workspace.layouts"]
python_conventional = "cosecha_workspace_python:PythonConventionalLayoutAdapter"

[tool.setuptools.dynamic]
version = {attr = "cosecha_workspace_python.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
