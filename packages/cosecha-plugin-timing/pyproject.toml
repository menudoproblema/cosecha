[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cosecha-plugin-timing"
dynamic = ["version"]
description = "Cosecha Timing Plugin"
requires-python = ">=3.13"
dependencies = [
    "cosecha-core",
]

[dependency-groups]
dev = [
    "pre-commit",
    "ruff",
]

[project.entry-points."cosecha.plugins"]
timing = "cosecha.plugin.timing:TimingPlugin"

[tool.setuptools.dynamic]
version = {attr = "cosecha.plugin.timing._version.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
