[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cosecha-instrumentation-coverage"
dynamic = ["version"]
description = "Cosecha Coverage Instrumentation"
requires-python = ">=3.13"
dependencies = [
    "cosecha-core",
    "coverage==7.13.3",
]

[dependency-groups]
dev = [
    "pre-commit",
    "ruff",
]

[tool.setuptools.dynamic]
version = {attr = "cosecha.instrumentation.coverage._version.__version__"}

[project.entry-points."cosecha.instrumentation"]
coverage = "cosecha.instrumentation.coverage:CoverageInstrumenter"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
