[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cosecha-reporter-junit"
dynamic = ["version"]
description = "Cosecha JUnit Reporter"
requires-python = ">=3.13"
dependencies = [
    "cosecha-core",
]

[dependency-groups]
dev = [
    "pre-commit",
    "ruff",
]

[project.entry-points."cosecha.shell.reporting"]
junit = "cosecha.reporter.junit:JUnitReporter"

[tool.setuptools.dynamic]
version = {attr = "cosecha.reporter.junit._version.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
