[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cosecha-lsp"
dynamic = ["version"]
description = "Cosecha Language Server"
requires-python = ">=3.13"
dependencies = [
    "cosecha-core",
    "cosecha-engine-gherkin",
    "lsprotocol==2023.0.1",
    "pygls==1.3.1",
]

[dependency-groups]
dev = [
    "pre-commit",
    "ruff",
]

[project.scripts]
cosecha-lsp = "cosecha_lsp.lsp_server:main"
granjero = "cosecha_lsp.lsp_server:main"

[tool.setuptools.dynamic]
version = {attr = "cosecha_lsp._version.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
namespaces = false
