[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cosecha-workspace"
dynamic = ["version"]
description = "Workspace model and resolution policy for Cosecha"
requires-python = ">=3.13"
dependencies = []

[dependency-groups]
dev = [
    "pre-commit",
    "ruff",
]

[tool.setuptools.dynamic]
version = {attr = "cosecha.workspace._version.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
